version: "3.9"

# Local dev infrastructure only — PostgreSQL + Redis
# Run backend and frontend natively for hot reload
# Usage: docker-compose up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: prepforge_db
    environment:
      POSTGRES_USER: prepforge
      POSTGRES_PASSWORD: prepforge
      POSTGRES_DB: prepforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prepforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: prepforge_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
