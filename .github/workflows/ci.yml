name: PrepForge CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 🔐 SECRETS SCAN — runs first, blocks everything if secrets found ────────
  secrets-scan:
    name: Security — Scan for secrets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Scan full git history, not just the latest commit
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # optional — free for public repos
        with:
          args: --config .gitleaks.toml --verbose

  # ── BACKEND CI — blocked until secrets scan passes ─────────────────────────
  backend-ci:
    name: Backend — Lint + Test
    needs: [secrets-scan]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: prepforge
          POSTGRES_PASSWORD: prepforge
          POSTGRES_DB: prepforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check app/ tests/

      - name: Run tests
        env:
          ENV: development
          DB_URL: postgresql+asyncpg://prepforge:prepforge@localhost:5432/prepforge_test
          REDIS_URL: redis://localhost:6379/0
          CLERK_JWKS_URL: https://placeholder.clerk.accounts.dev/.well-known/jwks.json
          AI_PROVIDER: ollama
          OLLAMA_URL: http://localhost:11434
          OLLAMA_MODEL: llama3.1
          CLAUDE_API_KEY: placeholder
          JUDGE0_URL: https://judge0-ce.p.rapidapi.com
          JUDGE0_API_KEY: placeholder
        run: pytest tests/ -v

  # ── FRONTEND CI — blocked until secrets scan passes ────────────────────────
  frontend-ci:
    name: Frontend — Type Check + Build
    needs: [secrets-scan]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://api.prepforge.com
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
        run: pnpm build

  # ── DEPLOY — only runs when ALL three jobs above pass ─────────────────────
  deploy:
    name: Deploy to Railway
    needs: [secrets-scan, backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service prepforge-backend --detach
        working-directory: backend

      - name: Deploy frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service prepforge-frontend --detach
        working-directory: frontend
